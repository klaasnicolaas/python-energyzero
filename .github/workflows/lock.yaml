---
name: Lock

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inactivity-lock:
    name: Lock issues and PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write  # To lock issues
      pull-requests: write  # To lock PRs
    steps:
      - name: 🔒 Lock closed issues and PRs
        uses: klaasnicolaas/action-inactivity-lock@698ca093b2bc7d1b16b5b3dc9c955699b7ad481a # v2.0.0
        with:
          days-inactive-issues: 30
          lock-reason-issues: ""
          days-inactive-prs: 1
          lock-reason-prs: ""
